  <body>
    <div class="page-shell">
      <main id="editor" class="workspace">
        <section class="toolbar">
          <div class="brand-lockup">
            <span class="brand-mark">echoValue</span>
          </div>
          <button class="ghost-link" id="load-sample" type="button">
            Load sample
          </button>
        </section>

        <section class="workspace-head">
          <div>
            <h1>Cron schedule</h1>
          </div>
        </section>

        <section class="workspace-grid">
          <div class="editor-column">
            <label class="editor-label" for="cron-input">Cron expression</label>
            <div class="input-row">
              <input id="cron-input" type="text" spellcheck="false" value="" />
              <button class="ghost-link copy-button" id="copy-input" type="button">Copy</button>
            </div>
            <p class="editor-footnote">
              Format:
              <button class="field-chip" type="button" data-field="minute">minute</button>
              <button class="field-chip" type="button" data-field="hour">hour</button>
              <button class="field-chip" type="button" data-field="dayOfMonth">day</button>
              <button class="field-chip" type="button" data-field="month">month</button>
              <button class="field-chip" type="button" data-field="weekday">weekday</button>
              or shortcuts like <code>@daily</code>.
            </p>
            <div class="example-block">
              <p class="section-label">Examples</p>
              <div class="example-row" aria-label="Cron examples">
                <button class="example-chip" data-example="*/5 * * * *">
                  Every 5 minutes
                </button>
                <button class="example-chip" data-example="0 9 * * MON-FRI">
                  Weekday mornings
                </button>
                <button class="example-chip" data-example="0 */2 * * *">
                  Every 2 hours
                </button>
                <button class="example-chip" data-example="15 14 1 * *">
                  First day monthly
                </button>
                <button class="example-chip" data-example="0 0 1 JAN *">
                  Every January 1st
                </button>
                <button class="example-chip" data-example="0 18 * * 1,3,5">
                  Mon Wed Fri evenings
                </button>
                <button class="example-chip" data-example="30 6 1,15 * *">
                  1st and 15th
                </button>
                <button class="example-chip" data-example="0 12 * JAN-MAR MON-FRI">
                  Q1 weekdays at noon
                </button>
                <button class="example-chip" data-example="@daily">
                  Daily shortcut
                </button>
                <button class="example-chip" data-example="@hourly">
                  Hourly shortcut
                </button>
              </div>
            </div>
          </div>

          <div class="inspector-column">
            <section class="inspector-block">
              <div class="inspector-heading">
                <p class="section-label">Interpretation</p>
                <h2>What this schedule means</h2>
              </div>
              <div id="analysis-list" class="analysis-list"></div>
            </section>
          </div>
        </section>
      </main>
      <dialog class="field-dialog" id="field-dialog">
        <div class="field-dialog-head">
          <p class="section-label" id="field-dialog-label">Field</p>
          <button class="dialog-close" id="close-field-dialog" type="button" aria-label="Close dialog">Close</button>
        </div>
        <h2 id="field-dialog-title">Minute</h2>
        <p class="field-dialog-copy" id="field-dialog-copy"></p>
        <div class="field-dialog-body" id="field-dialog-body"></div>
      </dialog>
